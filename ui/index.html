<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internal Developer Platform</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── API helpers ──────────────────────────────────────────────
    const api = {
      getServices: () =>
        fetch('/services').then(r => r.json()),

      createService: (name, repoUrl, owner) =>
        fetch('/services', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, repo_url: repoUrl, owner }),
        }).then(r => {
          if (!r.ok) return r.text().then(t => { throw new Error(t) });
          return r.json();
        }),

      deploy: (service, image) =>
        fetch(`/deploy/${service}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image }),
        }).then(r => {
          if (!r.ok) return r.text().then(t => { throw new Error(t) });
          return r.json();
        }),

      getLogs: (service) =>
        fetch(`/logs/${service}`).then(r => r.json()),

      getMetrics: (service) =>
        fetch(`/metrics/${service}`).then(r => r.json()),
    };

    // ── StatusBadge ──────────────────────────────────────────────
    function StatusBadge({ service }) {
      const [status, setStatus] = useState('unknown');

      useEffect(() => {
        api.getMetrics(service)
          .then(m => setStatus(m.status))
          .catch(() => setStatus('unknown'));
      }, [service]);

      const colors = {
        healthy:  'bg-green-500',
        degraded: 'bg-red-500',
        unknown:  'bg-gray-500',
      };

      return (
        <span className={`inline-block w-2 h-2 rounded-full ${colors[status] || colors.unknown}`} />
      );
    }

    // ── ServiceList ──────────────────────────────────────────────
    function ServiceList({ services, onSelect, selected }) {
      if (services.length === 0) {
        return (
          <p className="text-gray-500 text-sm py-4">
            No services registered yet.
          </p>
        );
      }

      return (
        <div className="divide-y divide-gray-800">
          {services.map(svc => (
            <div
              key={svc.id}
              onClick={() => onSelect(svc.name)}
              className={`flex items-center justify-between px-4 py-3 cursor-pointer hover:bg-gray-800 transition-colors ${selected === svc.name ? 'bg-gray-800' : ''}`}
            >
              <div>
                <p className="font-medium text-sm">{svc.name}</p>
                <p className="text-gray-400 text-xs">{svc.owner}</p>
              </div>
              <StatusBadge service={svc.name} />
            </div>
          ))}
        </div>
      );
    }

    // ── NewServiceForm ───────────────────────────────────────────
    function NewServiceForm({ onCreated }) {
      const [name, setName]       = useState('');
      const [repo, setRepo]       = useState('');
      const [owner, setOwner]     = useState('');
      const [error, setError]     = useState('');
      const [loading, setLoading] = useState(false);

      const submit = async () => {
        if (!name || !repo || !owner) {
          setError('All fields are required');
          return;
        }
        setLoading(true);
        setError('');
        try {
          await api.createService(name, repo, owner);
          setName(''); setRepo(''); setOwner('');
          onCreated();
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="bg-gray-900 rounded-lg p-4 space-y-3">
          <h3 className="text-sm font-semibold text-gray-300">Register New Service</h3>
          {error && <p className="text-red-400 text-xs">{error}</p>}
          <input
            className="w-full bg-gray-800 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"
            placeholder="Service name"
            value={name}
            onChange={e => setName(e.target.value)}
          />
          <input
            className="w-full bg-gray-800 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"
            placeholder="Repo URL"
            value={repo}
            onChange={e => setRepo(e.target.value)}
          />
          <input
            className="w-full bg-gray-800 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"
            placeholder="Owner"
            value={owner}
            onChange={e => setOwner(e.target.value)}
          />
          <button
            onClick={submit}
            disabled={loading}
            className="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-50 rounded px-3 py-2 text-sm font-medium transition-colors"
          >
            {loading ? 'Registering...' : 'Register Service'}
          </button>
        </div>
      );
    }

    // ── DeployPanel ──────────────────────────────────────────────
    function DeployPanel({ service }) {
      const [image, setImage]     = useState('');
      const [result, setResult]   = useState('');
      const [loading, setLoading] = useState(false);

      const deploy = async () => {
        if (!image) return;
        setLoading(true);
        setResult('');
        try {
          const r = await api.deploy(service, image);
          setResult(`✓ Deployed ${r.service} with ${r.image}`);
          setImage('');
        } catch (e) {
          setResult(`✗ ${e.message}`);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="space-y-3">
          <h3 className="text-sm font-semibold text-gray-300">Deploy</h3>
          <div className="flex gap-2">
            <input
              className="flex-1 bg-gray-800 rounded px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-blue-500"
              placeholder="Image (e.g. nginx:1.25)"
              value={image}
              onChange={e => setImage(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && deploy()}
            />
            <button
              onClick={deploy}
              disabled={loading || !image}
              className="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 rounded px-4 py-2 text-sm font-medium transition-colors"
            >
              {loading ? '...' : 'Deploy'}
            </button>
          </div>
          {result && (
            <p className={`text-xs ${result.startsWith('✓') ? 'text-green-400' : 'text-red-400'}`}>
              {result}
            </p>
          )}
        </div>
      );
    }

    // ── LogsPanel ────────────────────────────────────────────────
    function LogsPanel({ service }) {
      const [logs, setLogs]       = useState([]);
      const [loading, setLoading] = useState(false);

      const fetchLogs = async () => {
        setLoading(true);
        try {
          const lines = await api.getLogs(service);
          setLogs(lines);
        } catch (e) {
          setLogs([]);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchLogs();
      }, [service]);

      return (
        <div className="space-y-2">
          <div className="flex items-center justify-between">
            <h3 className="text-sm font-semibold text-gray-300">Logs</h3>
            <button
              onClick={fetchLogs}
              className="text-xs text-gray-400 hover:text-white transition-colors"
            >
              {loading ? 'Loading...' : '↻ Refresh'}
            </button>
          </div>
          <div className="bg-gray-900 rounded-lg p-3 h-48 overflow-y-auto font-mono text-xs">
            {logs.length === 0 ? (
              <p className="text-gray-500">No logs available.</p>
            ) : (
              logs.map((log, i) => (
                <div key={i} className="flex gap-2 py-0.5">
                  <span className="text-gray-500 shrink-0">
                    {log.timestamp.slice(11, 19)}
                  </span>
                  <span className="text-gray-200 break-all">{log.line}</span>
                </div>
              ))
            )}
          </div>
        </div>
      );
    }

    // ── MetricsPanel ─────────────────────────────────────────────
    function MetricsPanel({ service }) {
      const [metrics, setMetrics] = useState(null);

      useEffect(() => {
        api.getMetrics(service)
          .then(setMetrics)
          .catch(() => setMetrics(null));
      }, [service]);

      if (!metrics) return null;

      return (
        <div className="space-y-2">
          <h3 className="text-sm font-semibold text-gray-300">Metrics</h3>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-gray-900 rounded-lg p-3">
              <p className="text-gray-400 text-xs">Ready Replicas</p>
              <p className="text-2xl font-bold mt-1">{metrics.ready_replicas}</p>
            </div>
            <div className="bg-gray-900 rounded-lg p-3">
              <p className="text-gray-400 text-xs">Status</p>
              <p className={`text-lg font-semibold mt-1 ${metrics.status === 'healthy' ? 'text-green-400' : 'text-red-400'}`}>
                {metrics.status}
              </p>
            </div>
          </div>
        </div>
      );
    }

    // ── App ──────────────────────────────────────────────────────
    function App() {
      const [services, setServices]         = useState([]);
      const [selected, setSelected]         = useState(null);
      const [showNewForm, setShowNewForm]   = useState(false);

      const loadServices = () => {
        api.getServices().then(data => {
          setServices(data);
          if (data.length > 0 && !selected) {
            setSelected(data[0].name);
          }
        });
      };

      useEffect(() => { loadServices(); }, []);

      return (
        <div className="max-w-5xl mx-auto p-6 space-y-6">
          {/* Header */}
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-xl font-bold">Internal Developer Platform</h1>
              <p className="text-gray-400 text-sm mt-0.5">
                {services.length} service{services.length !== 1 ? 's' : ''} registered
              </p>
            </div>
            <button
              onClick={() => setShowNewForm(f => !f)}
              className="bg-blue-600 hover:bg-blue-700 rounded px-4 py-2 text-sm font-medium transition-colors"
            >
              {showNewForm ? 'Cancel' : '+ New Service'}
            </button>
          </div>

          {/* New service form */}
          {showNewForm && (
            <NewServiceForm onCreated={() => {
              setShowNewForm(false);
              loadServices();
            }} />
          )}

          <div className="grid grid-cols-3 gap-6">
            {/* Service list */}
            <div className="col-span-1 bg-gray-900 rounded-lg overflow-hidden">
              <div className="px-4 py-3 border-b border-gray-800">
                <h2 className="text-sm font-semibold">Services</h2>
              </div>
              <ServiceList
                services={services}
                selected={selected}
                onSelect={setSelected}
              />
            </div>

            {/* Service detail */}
            <div className="col-span-2 space-y-6">
              {selected ? (
                <>
                  <div className="bg-gray-900 rounded-lg p-4">
                    <h2 className="text-sm font-semibold mb-4 text-gray-300">
                      {selected}
                    </h2>
                    <div className="space-y-6">
                      <DeployPanel service={selected} />
                      <MetricsPanel service={selected} />
                    </div>
                  </div>
                  <div className="bg-gray-900 rounded-lg p-4">
                    <LogsPanel service={selected} />
                  </div>
                </>
              ) : (
                <div className="bg-gray-900 rounded-lg p-8 text-center text-gray-500 text-sm">
                  Select a service to view details
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
